name: Linux CI

on:
  push:
    branches: [main, v2_Ingrassia]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            python: "3.11"
          - os: ubuntu-24.04
            python: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Verifica packaging Linux
        run: |
          test -x scripts/linux/install.sh
          test -x scripts/linux/run.sh
          bash -n scripts/linux/install.sh
          bash -n scripts/linux/run.sh

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Dipendenze test leggere
        run: python -m pip install numpy pillow chromadb scikit-learn

      - name: Test e compilazione
        run: |
          python scripts/run_tests.py
          python -m compileall -q src scripts
